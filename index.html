<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luan - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f0f0f; font-family: 'Inter', sans-serif; color: white; cursor: crosshair; }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.4; z-index: -2; }
        .glass-card { background: rgba(15, 15, 15, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .avatar-glow { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .avatar-glow:hover { box-shadow: 0 0 35px rgba(255, 255, 255, 0.6); transform: scale(1.05); transition: all 0.3s ease; }
        .avatar-no-glow { transition: transform 0.3s ease; }
        .avatar-no-glow:hover { transform: scale(1.05); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

    <div id="profile-view" class="relative active-profile">

        <!-- Conteúdo do Perfil -->
        <div id="main-content" class="relative min-h-screen flex items-center justify-center p-4">
            
            <!-- Fundo Dinâmico -->
            <div id="generated-bg" class="bg-image" style="background-image: none; background-color: rgb(10, 10, 10);"></div>
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/80 z-[-1]"></div>
            <canvas id="particles" class="absolute inset-0 z-0 pointer-events-none" width="380" height="563" style="display: block;"></canvas>

            <!-- Card Central -->
            <div class="glass-card z-10 p-8 rounded-3xl w-full max-w-[420px] flex flex-col items-center relative overflow-hidden group">
                
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gray-700 via-white to-gray-700 opacity-50"></div>

                <!-- Avatar -->
                <div class="relative mb-4">
                    <img id="display-avatar" src="https://i.ibb.co/7dXgvs55/0d2b78aad853bb7d208cdacfbe67c37e.jpg" alt="Avatar" class="w-28 h-28 rounded-full object-cover border-2 border-white/20 avatar-no-glow">
                    <div class="absolute bottom-1 right-1 w-5 h-5 bg-[#23a559] border-4 border-[#0f0f0f] rounded-full"></div>
                </div>

                <!-- Nome e Badges -->
                <div class="flex items-center gap-2 mb-1">
                    <h1 id="display-name" class="text-2xl font-bold tracking-tight">Luan</h1>
                    <div id="display-badges" class="flex gap-1" style="display: flex;">
                        <i class="fa-solid fa-circle-check text-blue-400 text-sm" title="Verificado"></i>
                    </div>
                </div>
                
                <!-- Subtítulo -->
                <p id="display-username" class="text-gray-400 text-sm font-medium mb-5">@luanznv</p>

                <!-- Typewriter -->
                <div class="h-10 text-center mb-6 px-4">
                    <span id="typewriter" class="font-mono text-gray-300 text-sm md:text-base">?</span><span class="font-mono animate-pulse">_</span>
                </div>

                <!-- Container Redes Sociais -->
                <div id="display-socials" class="flex flex-wrap justify-center items-center gap-5 mb-8"><a href="https://www.instagram.com/5e_luan?igsh=ZTR4d3dvaDZxYXoy" target="_blank" class="text-gray-400 hover:text-white transform hover:-translate-y-1 hover:scale-110 transition-all duration-300 relative z-20"><i class="fa-brands fa-instagram text-2xl drop-shadow-[0_0_5px_rgba(255,255,255,0.3)]"></i></a><a href="https://www.roblox.com/pt/users/10155924133/profile?friendshipSourceType=PlayerSearch" target="_blank" class="text-gray-400 hover:text-white transform hover:-translate-y-1 hover:scale-110 transition-all duration-300 relative z-20"><svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 drop-shadow-[0_0_5px_rgba(255,255,255,0.3)]"><path d="M5.426 3.064L20.936 6.574 18.574 20.936 3.064 17.426 5.426 3.064zM12.987 13.916c.866-.196 1.411-1.058 1.215-1.924-.196-.866-1.058-1.411-1.924-1.215-.866.196-1.411 1.058-1.215 1.924.196.866 1.058 1.411 1.924 1.215z"></path></svg></a></div>

                <!-- Rodapé -->
                <div class="w-full pt-4 border-t border-white/10 flex justify-center items-center text-xs text-gray-500">
                    <div class="flex items-center gap-1.5">
                        <i class="fa-solid fa-eye"></i>
                        <span id="view-count">135k+</span>
                    </div>
                </div>
            </div>
            
            <!-- Botões flutuantes -->
            
        </div>
    </div>

    <script>
        // --- Animação do Typewriter ---
        const phrasesArray = ["?"];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeWriterLoop() {
            const typewriterEl = document.getElementById('typewriter');
            if(!typewriterEl) return;
            const currentPhrase = phrasesArray[phraseIndex];

            if (isDeleting) {
                typewriterEl.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterEl.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 30 : 80;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrasesArray.length;
                typeSpeed = 500;
            }

            setTimeout(typeWriterLoop, typeSpeed);
        }
        typeWriterLoop();

        // --- Sistema de Partículas ---
        const useParticles = true;
        const canvas = document.getElementById('particles');
        
        if(useParticles && canvas) {
            const ctx = canvas.getContext('2d');
            let particlesArray = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);

            class Particle {
                constructor() {
                    this.x = Math.random() * window.innerWidth;
                    this.y = Math.random() * window.innerHeight;
                    this.size = Math.random() * 2;
                    this.speedY = Math.random() * 0.5 + 0.1;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if (this.y > canvas.height) {
                        this.y = 0 - this.size;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                }
                draw() {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                particlesArray = [];
                for (let i = 0; i < 70; i++) {
                    particlesArray.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                requestAnimationFrame(animateParticles);
            }

            resizeCanvas();
            initParticles();
            animateParticles();
        }
    </script>
</body>
</html>
